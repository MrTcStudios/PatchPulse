window.addEventListener("unhandledrejection", e => { document.title = "REJ: " + (e.reason && e.reason.message || String(e.reason)); });

/* ───────── Stub API per il BACKGROUND (caricato in questa pagina) ───────── */
window.__updates = [];
window.__tabsCreated = [];
window.__onNav = null;
window.__onCommitted = null;
window.__onMsg = null;
window.__onInstalled = null;
window.__storageChanged = null;

function makeStorageArea(name) {
  let firstGet = true;
  return {
    _d: {},
    async get(keys) {
      /* Il PRIMO get di storage.local e' ritardato di proposito: simula il
         risveglio dell'event page con la navigazione che arriva PRIMA che
         loadDomains() abbia finito (sezione R). */
      if (name === "local" && firstGet) {
        firstGet = false;
        await new Promise((r) => setTimeout(r, 40));
      }
      if (typeof keys === "string") keys = [keys];
      const out = {};
      for (const k of keys) if (k in this._d) out[k] = this._d[k];
      return out;
    },
    async set(obj) {
      const changes = {};
      for (const k in obj) { changes[k] = { oldValue: this._d[k], newValue: obj[k] }; this._d[k] = obj[k]; }
      if (name === "local" && window.__storageChanged) window.__storageChanged(changes, "local");
    }
  };
}

window.browser = {
  storage: {
    local: makeStorageArea("local"),
    session: makeStorageArea("session"),
    onChanged: { addListener(fn) { window.__storageChanged = fn; } }
  },
  runtime: {
    onMessage: { addListener(fn) { window.__onMsg = fn; } },
    onInstalled: { addListener(fn) { window.__onInstalled = fn; } },
    getURL(p) { return "moz-extension://test/" + p; }
  },
  webNavigation: {
    onBeforeNavigate: { addListener(fn) { window.__onNav = fn; } },
    onCommitted: { addListener(fn) { window.__onCommitted = fn; } }
  },
  tabs: {
    update(id, o) { window.__updates.push({ id, url: o.url }); },
    create(o) { window.__tabsCreated.push(o.url); }
  },
  action: {
    setBadgeText(o) { window.__badgeText = o.text; },
    setBadgeBackgroundColor() {}
  }
};

/* Stub per le PAGINE (popup/warning) in iframe. */
window.makePageStub = function (opts) {
  const logs = { messages: [], removedTabs: [], queries: 0, created: [], optionsOpened: false };
  const stub = {
    i18n: { getUILanguage() { return opts.lang || "en-US"; } },
    storage: {
      local: {
        async get(keys) {
          if (typeof keys === "string") keys = [keys];
          const out = {};
          for (const k of keys) if (k in opts.storage) out[k] = opts.storage[k];
          return out;
        },
        async set(obj) { Object.assign(opts.storage, obj); }
      }
    },
    runtime: {
      async sendMessage(msg) { logs.messages.push(msg); return { ok: true }; },
      getManifest() { return { version: "9.9.9-test" }; },
      getURL(p) { return "moz-extension://test/" + p; },
      async openOptionsPage() { logs.optionsOpened = true; }
    },
    tabs: {
      async query() { logs.queries++; return opts.tabs || []; },
      async getCurrent() { return { id: 42 }; },
      async remove(id) { logs.removedTabs.push(id); },
      async create(o) { logs.created.push(o.url); }
    }
  };
  return { stub, logs };
};
</script>

    async function loadWarning(query, opts) {
      const res = await fetch("/warning/warning.html");
      let html = await res.text();
      /* cache-bust degli script: la memory-cache dell'iframe puo' servire
         versioni vecchie dei .js anche dopo un reload della pagina di test */
      html = html.replace(/src="([^"]+\.js)"/g, 'src="$1?b=' + Date.now() + '"');

      const key = "__stub" + Math.random().toString(36).slice(2);
      window[key] = stub;

        + '(function(){var R = window.URLSearchParams; var Q = ' + JSON.stringify(query) + ';'

        + 'try { navigator.clipboard.writeText = function(t){ window.__copied = t; return Promise.resolve(); }; } catch (e) {}';
      html = html.replace(/<head>/i, '<head><base href="' + location.origin + '/warning/">');
      html = html.replace(/<script/i, '<scr' + 'ipt>' + inject + '</scr' + 'ipt><scr' + 'ipt');
      const f = document.createElement("iframe");
      f.style.cssText = "width:700px;height:520px;visibility:hidden;position:absolute";
      document.body.appendChild(f);

      const how = await p;
      await sleep(80);
      return { f, logs, how };

       && w5.contentDocument.getElementById("puny").textContent === "xn--pypal-rqa.com",
       "warning IDN: riga 'indirizzo reale' col punycode");
    w5.remove();

    /* v1.6: modalita' demo (aperta dall'onboarding): nessuna azione possibile */
    let { f: w6, logs: l6 } = await loadWarning("?demo=1&suspicious=rnicrosoft.com&official=microsoft.com&reason=typo", { lang: "en-US", storage: {} });
    ok(!w6.contentDocument.getElementById("demo-note").hidden, "warning demo: nota dimostrativa visibile");
    ok(w6.contentDocument.getElementById("trust").hidden && w6.contentDocument.getElementById("proceed").hidden,
       "warning demo: 'mi fido' e 'vai comunque' nascosti");
    ok(l6.messages.length === 0, "warning demo: nessun messaggio al background");
    w6.remove();

    /* ═════════ H. POPUP (srcdoc + stub pre-iniettato) ═════════ */
    document.title = "sezione H";
    out.push("\n===== H. POPUP =====");
    async function loadPopup(opts) {
      const res = await fetch("/popup/popup.html");
      let html = await res.text();
      html = html.replace(/src="([^"]+\.js)"/g, 'src="$1?b=' + Date.now() + '"');
      const { stub, logs } = window.makePageStub(opts);
      const key = "__stub" + Math.random().toString(36).slice(2);
      window[key] = stub;
      html = html.replace(/<head>/i, '<head><base href="' + location.origin + '/popup/">');
      html = html.replace(/<script/i, '<scr' + 'ipt>window.browser = parent["' + key + '"];</scr' + 'ipt><scr' + 'ipt');
      const f = document.createElement("iframe");
      f.style.cssText = "width:360px;height:560px;visibility:hidden;position:absolute";
      document.body.appendChild(f);
      const p = awaitLoad(f);
      f.srcdoc = html;
      const how = await p;
      await sleep(100);
      return { f, logs, how };
    }

    const popupStorage = {
      officialDomains: ["google.com", "ebay.it"],
      blockedCount: 7,
      recentBlocked: [{ d: "evil-paypal.com", o: "paypal.com", r: "combo", t: Date.now() }]
    };
    let { f: p1, logs: lp1, how: howP } = await loadPopup({ lang: "en-US", storage: popupStorage, tabs: [{ url: "https://login.mybank.it/area" }] });
    ok(howP === "load", "popup: pagina caricata");
    d = p1.contentDocument;
    ok(d.getElementById("count").textContent === "2", "popup: contatore lista = 2");
    ok(d.querySelectorAll("#domain-list li").length === 2, "popup: 2 domini renderizzati");
    ok(d.getElementById("blocked").textContent.includes("7"), "popup: contatore minacce '7' mostrato");
    ok(d.getElementById("ver").textContent === "v9.9.9-test", "popup: versione estensione mostrata");
    ok(!d.getElementById("recent-section").hidden, "popup: sezione minacce recenti visibile");
    ok(d.querySelector("#recent-list .rb-domain").textContent === "evil-paypal.com", "popup: minaccia recente mostrata");
    ok(d.querySelector("#recent-list .rb-meta").textContent.length > 5, "popup: motivo+data della minaccia mostrati");
    ok(d.querySelector(".tagline").textContent.toLowerCase().includes("anti-phishing"), "popup EN: tagline tradotta");

    d.getElementById("domain-input").value = "https://www.Esempio.com/login";
    d.getElementById("add-btn").click();
    await sleep(80);
    ok(popupStorage.officialDomains.includes("esempio.com"), "popup: URL completo -> aggiunto esempio.com");
    ok(d.getElementById("msg").className.includes("ok"), "popup: messaggio di conferma");

    d.getElementById("domain-input").value = "esempio.com";
    d.getElementById("add-btn").click();
    await sleep(80);
    ok(popupStorage.officialDomains.filter(x => x === "esempio.com").length === 1, "popup: duplicato non aggiunto");
    d.getElementById("domain-input").value = "not a domain!!";
    d.getElementById("add-btn").click();
    await sleep(80);
    ok(d.getElementById("msg").className.includes("error"), "popup: input non valido -> errore");
    ok(popupStorage.officialDomains.length === 3, "popup: lista invariata dopo input non valido");

    d.getElementById("domain-input").value = "a..b.com";
    d.getElementById("add-btn").click();
    await sleep(80);
    ok(d.getElementById("msg").className.includes("error") && popupStorage.officialDomains.length === 3,
       "popup: 'a..b.com' rifiutato (validazione condivisa looksLikeDomain)");

    d.getElementById("domain-input").value = "sub.shop.example.co.uk";
    d.getElementById("add-btn").click();
    await sleep(80);
    ok(popupStorage.officialDomains.includes("example.co.uk"), "popup: estrae example.co.uk");

    d.getElementById("domain-input").value = "sub.absa.co.za";
    d.getElementById("add-btn").click();
    await sleep(80);
    ok(popupStorage.officialDomains.includes("absa.co.za"), "popup: estrae absa.co.za (PSL, prima salvava 'co.za')");

    d.getElementById("add-current").click();
    await sleep(80);
    ok(popupStorage.officialDomains.includes("mybank.it"), "popup: 'proteggi sito attuale' -> mybank.it");

    const li = [...d.querySelectorAll("#domain-list li")].find(x => x.textContent.includes("ebay.it"));
    li.querySelector(".remove").click();
    await sleep(80);
    ok(!popupStorage.officialDomains.includes("ebay.it"), "popup: rimozione con x funziona");

    /* v1.6: distintivo "tuo" sui domini aggiunti dall'utente */
    const yoursLi = [...d.querySelectorAll("#domain-list li")].find(x => x.dataset.d === "mybank.it");
    ok(!!(yoursLi && yoursLi.querySelector(".tag-yours")), "popup: distintivo 'tuo' sul dominio utente");
    const defLi = [...d.querySelectorAll("#domain-list li")].find(x => x.dataset.d === "google.com");
    ok(!!(defLi && !defLi.querySelector(".tag-yours")), "popup: nessun distintivo sui default");

    /* v1.6: filtro della lista */
    d.getElementById("filter").value = "esempio";
    d.getElementById("filter").dispatchEvent(new p1.contentWindow.Event("input"));
    await sleep(50);
    const visibleLis = [...d.querySelectorAll("#domain-list li")].filter(li => !li.hidden);
    ok(visibleLis.length === 1 && visibleLis[0].dataset.d === "esempio.com",
       "popup: filtro mostra solo i domini corrispondenti");
    d.getElementById("filter").value = "";
    d.getElementById("filter").dispatchEvent(new p1.contentWindow.Event("input"));

    /* v1.6: ingranaggio -> impostazioni */
    d.getElementById("options").click();
    await sleep(50);
    ok(lp1.optionsOpened === true, "popup: ingranaggio apre la pagina impostazioni");
    p1.remove();

    /* v1.4.1: il tetto MAX_DOMAINS vale anche per il popup (prima lo saltava) */
    const bigList = []; for (let i = 0; i < MAX_DOMAINS; i++) bigList.push("d" + i + ".com");
    const bigStore = { officialDomains: bigList };
    let { f: p3 } = await loadPopup({ lang: "en-US", storage: bigStore, tabs: [] });
    p3.contentDocument.getElementById("domain-input").value = "overflow.com";
    p3.contentDocument.getElementById("add-btn").click();
    await sleep(150);
    ok(bigStore.officialDomains.length === MAX_DOMAINS
       && p3.contentDocument.getElementById("msg").className.includes("error"),
       "popup: tetto " + MAX_DOMAINS + " -> aggiunta rifiutata con messaggio");
    p3.remove();

    let { f: p2 } = await loadPopup({ lang: "it-IT", storage: { officialDomains: ["google.com"] }, tabs: [] });
    ok(p2.contentDocument.querySelector(".tagline").textContent.includes("Protezione"), "popup IT: tagline in italiano");
    p2.contentDocument.getElementById("add-current").click();
    await sleep(80);
    ok(p2.contentDocument.getElementById("msg").className.includes("error"), "popup: nessuna scheda -> errore gestito");
    ok(p2.contentDocument.getElementById("recent-section").hidden, "popup: senza minacce la sezione recenti resta nascosta");
    p2.remove();

    /* ═════════ J. ONBOARDING (UI reale in iframe) ═════════ */
    document.title = "sezione J";
    out.push("\n===== J. ONBOARDING =====");
    async function loadOnboarding(opts) {
      const res = await fetch("/onboarding/onboarding.html");
      let html = await res.text();
      html = html.replace(/src="([^"]+\.js)"/g, 'src="$1?b=' + Date.now() + '"');
      const { stub, logs } = window.makePageStub(opts);
      const key = "__stub" + Math.random().toString(36).slice(2);
      window[key] = stub;
      html = html.replace(/<head>/i, '<head><base href="' + location.origin + '/onboarding/">');
      html = html.replace(/<script/i, '<scr' + 'ipt>window.browser = parent["' + key + '"];</scr' + 'ipt><scr' + 'ipt');
      const f = document.createElement("iframe");
      f.style.cssText = "width:700px;height:700px;visibility:hidden;position:absolute";
      document.body.appendChild(f);
      const p = awaitLoad(f);
      f.srcdoc = html;
      const how = await p;
      await sleep(100);
      return { f, logs, how };
    }

    const obStorage = { officialDomains: ["google.com"] };
    let { f: ob1, logs: obLogs, how: howOb } = await loadOnboarding({ lang: "en-US", storage: obStorage, tabs: [] });
    ok(howOb === "load", "onboarding: pagina caricata");
    const od = ob1.contentDocument;
    ok(od.querySelector("h1").textContent.includes("Welcome"), "onboarding EN: titolo tradotto");
    ok(od.getElementById("intro").textContent.includes("1"), "onboarding: conteggio siti protetti nel testo");
    ok(od.getElementById("version").textContent.includes("9.9.9-test"), "onboarding: versione mostrata");
    od.getElementById("demo").click();
    await sleep(50);
    ok(obLogs.created.length === 1 && obLogs.created[0].includes("warning/warning.html?demo=1"),
       "onboarding: 'guarda un esempio' apre l'avviso in modalita' demo");
    od.getElementById("domain-input").value = "https://www.MyBank.it/login";
    od.getElementById("add-btn").click();
    await sleep(100);
    ok(obStorage.officialDomains.includes("mybank.it"), "onboarding: dominio aggiunto dal benvenuto");
    ok(od.querySelector("#added-list li").textContent.includes("mybank.it"), "onboarding: feedback voce aggiunta");
    od.getElementById("done").click();
    await sleep(80);
    ok(obLogs.removedTabs.includes(42), "onboarding: 'Fatto' chiude la scheda");
    ob1.remove();

    let { f: ob2 } = await loadOnboarding({ lang: "it-IT", storage: { officialDomains: [] }, tabs: [] });
    ok(ob2.contentDocument.querySelector("h1").textContent.includes("Benvenuto"), "onboarding IT: titolo in italiano");
    ok(ob2.contentDocument.getElementById("intro").textContent.includes(String(DEFAULT_DOMAINS.length)),
       "onboarding: senza storage usa il conteggio dei default");
    ob2.remove();

    /* ═════════ K. PAGINA OPZIONI (v1.6, UI reale in iframe) ═════════ */
    document.title = "sezione K";
    out.push("\n===== K. PAGINA OPZIONI =====");
    async function loadOptions(opts) {
      const res = await fetch("/options/options.html");
      let html = await res.text();
      html = html.replace(/src="([^"]+\.js)"/g, 'src="$1?b=' + Date.now() + '"');
      const { stub, logs } = window.makePageStub(opts);
      const key = "__stub" + Math.random().toString(36).slice(2);
      window[key] = stub;
      html = html.replace(/<head>/i, '<head><base href="' + location.origin + '/options/">');
      html = html.replace(/<script/i, '<scr' + 'ipt>window.browser = parent["' + key + '"];</scr' + 'ipt><scr' + 'ipt');
      const f = document.createElement("iframe");
      f.style.cssText = "width:660px;height:820px;visibility:hidden;position:absolute";
      document.body.appendChild(f);
      const p = awaitLoad(f);
      f.srcdoc = html;
      const how = await p;
      await sleep(100);
      return { f, logs, how };
    }

    const optStorage = {
      officialDomains: ["google.com", "mybank.it"],
      removedDefaults: ["poste.it"],
      userGreenList: ["trusted.com"],
      blockedCount: 5,
      recentBlocked: [{ d: "x.com", o: "y.com", r: "typo", t: Date.now() }]
    };
    let { f: k1, how: howK } = await loadOptions({ lang: "en-US", storage: optStorage, tabs: [] });
    ok(howK === "load", "opzioni: pagina caricata");
    const kd = k1.contentDocument;
    ok(kd.getElementById("ver").textContent === "v9.9.9-test", "opzioni: versione mostrata");
    ok(kd.querySelectorAll("#green-list li").length === 1
       && kd.querySelector("#green-list li span").textContent === "trusted.com",
       "opzioni: siti fidati renderizzati dallo storage");
    ok(kd.getElementById("green-empty").hidden, "opzioni: nota 'vuoto' nascosta se ci sono voci");
    ok(kd.getElementById("pause-toggle").checked === false && kd.getElementById("paused-warn").hidden,
       "opzioni: pausa spenta di default");
    ok(kd.getElementById("history-toggle").checked === true, "opzioni: cronologia attiva di default");

    /* pausa on/off scrive in storage e mostra l'avviso */
    kd.getElementById("pause-toggle").checked = true;
    kd.getElementById("pause-toggle").dispatchEvent(new k1.contentWindow.Event("change"));
    await sleep(60);
    ok(optStorage.paused === true, "opzioni: pausa attivata -> salvata in storage");
    ok(!kd.getElementById("paused-warn").hidden, "opzioni: avviso 'in pausa' visibile");
    kd.getElementById("pause-toggle").checked = false;
    kd.getElementById("pause-toggle").dispatchEvent(new k1.contentWindow.Event("change"));
    await sleep(60);
    ok(optStorage.paused === false, "opzioni: riattivazione salvata");

    /* cronologia off + cancella tutto */
    kd.getElementById("history-toggle").checked = false;
    kd.getElementById("history-toggle").dispatchEvent(new k1.contentWindow.Event("change"));
    await sleep(60);
    ok(optStorage.recordHistory === false, "opzioni: registro cronologia disattivato");
    kd.getElementById("clear-history").click();
    await sleep(60);
    ok(optStorage.blockedCount === 0 && optStorage.recentBlocked.length === 0,
       "opzioni: 'cancella' azzera contatore e cronologia");
    ok(kd.getElementById("msg").textContent.length > 3, "opzioni: conferma della cancellazione mostrata");

    /* rimozione di un sito fidato */
    kd.querySelector("#green-list .remove").click();
    await sleep(60);
    ok(optStorage.userGreenList.length === 0, "opzioni: sito fidato rimosso");
    ok(!kd.getElementById("green-empty").hidden, "opzioni: nota 'vuoto' visibile dopo la rimozione");

    /* ripristino della lista in due passi */
    const resetB = kd.getElementById("reset-defaults");
    const armText0 = resetB.textContent;
    resetB.click();
    await sleep(60);
    ok(resetB.textContent !== armText0 && optStorage.officialDomains.length === 2,
       "opzioni: primo click arma soltanto (nessun ripristino)");
    resetB.click();
    await sleep(60);
    ok(optStorage.officialDomains.length === DEFAULT_DOMAINS.length
       && optStorage.removedDefaults.length === 0,
       "opzioni: secondo click ripristina i " + DEFAULT_DOMAINS.length + " default e svuota removedDefaults");
    k1.remove();

    let { f: k2 } = await loadOptions({ lang: "it-IT", storage: { userGreenList: [] }, tabs: [] });
    ok(k2.contentDocument.querySelector(".tagline").textContent === "Impostazioni", "opzioni IT: titolo tradotto");
    ok(!k2.contentDocument.getElementById("green-empty").hidden, "opzioni: lista fidati vuota -> nota visibile");
    k2.remove();

  } catch (e) {
    out.push("\nECCEZIONE: " + e.message + "\n" + (e.stack || ""));
    fail++; failures.push("ECCEZIONE: " + e.message);
  }

  /* ═════════ RISULTATO ═════════ */
  const head = "RISULTATO FINALE: " + pass + " pass, " + fail + " fail";
  document.title = "fulltest: " + pass + "p/" + fail + "f";
  let report = head + "\n";
  if (failures.length) report += "\nFALLITI:\n" + failures.map(x => "  - " + x).join("\n") + "\n";
  document.body.insertBefore(document.createTextNode(report + "\n" + out.join("\n")), document.body.firstChild);
  console.log(head);
})();
</script>
</body>
</html>
