window.addEventListener("error", e => { document.title = "ERR: " + e.message; });
window.addEventListener("unhandledrejection", e => { document.title = "REJ: " + (e.reason && e.reason.message || String(e.reason)); });

/* ───────── Stub API per il BACKGROUND (caricato in questa pagina) ───────── */
window.__updates = [];
window.__onNav = null;
window.__onMsg = null;
window.__storageChanged = null;

function makeStorageArea(name) {
  return {
    _d: {},
    async get(keys) {
      if (typeof keys === "string") keys = [keys];
      const out = {};
      for (const k of keys) if (k in this._d) out[k] = this._d[k];
      return out;
    },
    async set(obj) {
      const changes = {};
      for (const k in obj) { changes[k] = { newValue: obj[k] }; this._d[k] = obj[k]; }
      if (name === "local" && window.__storageChanged) window.__storageChanged(changes, "local");
    }
  };
}

window.browser = {
  storage: {
    local: makeStorageArea("local"),
    session: makeStorageArea("session"),
    onChanged: { addListener(fn) { window.__storageChanged = fn; } }
  },
  runtime: {
    onMessage: { addListener(fn) { window.__onMsg = fn; } },
    getURL(p) { return "moz-extension://test/" + p; }
  },
  webNavigation: { onBeforeNavigate: { addListener(fn) { window.__onNav = fn; } } },
  tabs: { update(id, o) { window.__updates.push({ id, url: o.url }); } }
};

/* Stub per le PAGINE (popup/warning) in iframe. */
window.makePageStub = function (opts) {
  const logs = { messages: [], removedTabs: [], queries: 0 };
  const stub = {
    i18n: { getUILanguage() { return opts.lang || "en-US"; } },
    storage: {
      local: {
        async get(keys) {
          if (typeof keys === "string") keys = [keys];
          const out = {};
          for (const k of keys) if (k in opts.storage) out[k] = opts.storage[k];
          return out;
        },
        async set(obj) { Object.assign(opts.storage, obj); }
      }
    },
    runtime: { async sendMessage(msg) { logs.messages.push(msg); return { ok: true }; } },
    tabs: {
      async query() { logs.queries++; return opts.tabs || []; },
      async getCurrent() { return { id: 42 }; },
      async remove(id) { logs.removedTabs.push(id); }
    }
  };
  return { stub, logs };
};
</script>

      const q = "?suspicious=x.com&official=y.com&reason=" + reason + "&target=" + encodeURIComponent(target);
      const { f } = await loadWarning(q, { lang: "en-US", storage: {} });
      ok(f.contentDocument.getElementById("reason").textContent.length > 5, "warning: motivo '" + reason + "' ha testo");
      f.remove();
    }

    /* ═════════ H. POPUP (srcdoc + stub pre-iniettato) ═════════ */
    document.title = "sezione H";
    out.push("\n===== H. POPUP =====");
    async function loadPopup(opts) {
      const res = await fetch("/popup/popup.html");
      let html = await res.text();
      const { stub, logs } = window.makePageStub(opts);
      const key = "__stub" + Math.random().toString(36).slice(2);
      window[key] = stub;
      html = html.replace(/<head>/i, '<head><base href="' + location.origin + '/popup/">');
      html = html.replace(/<script/i, '<scr' + 'ipt>window.browser = parent["' + key + '"];</scr' + 'ipt><scr' + 'ipt');
      const f = document.createElement("iframe");
      f.style.cssText = "width:360px;height:560px;visibility:hidden;position:absolute";
      document.body.appendChild(f);
      const p = awaitLoad(f);
      f.srcdoc = html;
      const how = await p;
      await sleep(100);
      return { f, logs, how };
    }

    const popupStorage = { officialDomains: ["google.com", "ebay.it"], blockedCount: 7 };
    let { f: p1, how: howP } = await loadPopup({ lang: "en-US", storage: popupStorage, tabs: [{ url: "https://login.mybank.it/area" }] });
    ok(howP === "load", "popup: pagina caricata");
    d = p1.contentDocument;
    ok(d.getElementById("count").textContent === "2", "popup: contatore lista = 2");
    ok(d.querySelectorAll("#domain-list li").length === 2, "popup: 2 domini renderizzati");
    ok(d.getElementById("blocked").textContent.includes("7"), "popup: contatore minacce '7' mostrato");
    ok(d.querySelector(".tagline").textContent.toLowerCase().includes("anti-phishing"), "popup EN: tagline tradotta");

    d.getElementById("domain-input").value = "https://www.Esempio.com/login";
    d.getElementById("add-btn").click();
    await sleep(80);
    ok(popupStorage.officialDomains.includes("esempio.com"), "popup: URL completo -> aggiunto esempio.com");
    ok(d.getElementById("msg").className.includes("ok"), "popup: messaggio di conferma");

    d.getElementById("domain-input").value = "esempio.com";
    d.getElementById("add-btn").click();
    await sleep(80);
    ok(popupStorage.officialDomains.filter(x => x === "esempio.com").length === 1, "popup: duplicato non aggiunto");
    d.getElementById("domain-input").value = "not a domain!!";
    d.getElementById("add-btn").click();
    await sleep(80);
    ok(d.getElementById("msg").className.includes("error"), "popup: input non valido -> errore");
    ok(popupStorage.officialDomains.length === 3, "popup: lista invariata dopo input non valido");

    d.getElementById("domain-input").value = "sub.shop.example.co.uk";
    d.getElementById("add-btn").click();
    await sleep(80);
    ok(popupStorage.officialDomains.includes("example.co.uk"), "popup: estrae example.co.uk");

    d.getElementById("add-current").click();
    await sleep(80);
    ok(popupStorage.officialDomains.includes("mybank.it"), "popup: 'proteggi sito attuale' -> mybank.it");

    const li = [...d.querySelectorAll("#domain-list li")].find(x => x.textContent.includes("ebay.it"));
    li.querySelector(".remove").click();
    await sleep(80);
    ok(!popupStorage.officialDomains.includes("ebay.it"), "popup: rimozione con x funziona");
    p1.remove();

    let { f: p2 } = await loadPopup({ lang: "it-IT", storage: { officialDomains: ["google.com"] }, tabs: [] });
    ok(p2.contentDocument.querySelector(".tagline").textContent.includes("Protezione"), "popup IT: tagline in italiano");
    p2.contentDocument.getElementById("add-current").click();
    await sleep(80);
    ok(p2.contentDocument.getElementById("msg").className.includes("error"), "popup: nessuna scheda -> errore gestito");
    p2.remove();

  } catch (e) {
    out.push("\nECCEZIONE: " + e.message + "\n" + (e.stack || ""));
    fail++; failures.push("ECCEZIONE: " + e.message);
  }

  /* ═════════ RISULTATO ═════════ */
  const head = "RISULTATO FINALE: " + pass + " pass, " + fail + " fail";
  document.title = "fulltest: " + pass + "p/" + fail + "f";
  let report = head + "\n";
  if (failures.length) report += "\nFALLITI:\n" + failures.map(x => "  - " + x).join("\n") + "\n";
  document.body.insertBefore(document.createTextNode(report + "\n" + out.join("\n")), document.body.firstChild);
  console.log(head);
})();
</script>
</body>
</html>
