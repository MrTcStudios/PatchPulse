<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>PatchPulse selftest</title>
<style>body{font-family:monospace;white-space:pre}</style>
</head>
<body>
<script>
/* Stub delle API WebExtension: permette di caricare il VERO background.js
   fuori dal browser-extension context e testare la pipeline reale. */
window.browser = {
  storage: {
    local: {
      _data: {},
      async get(keys) {
        if (typeof keys === "string") keys = [keys];
        const out = {};
        for (const k of keys) if (k in this._data) out[k] = this._data[k];
        return out;
      },
      async set(obj) { Object.assign(this._data, obj); }
    },
    session: {
      _data: {},
      async get(keys) {
        if (typeof keys === "string") keys = [keys];
        const out = {};
        for (const k of keys) if (k in this._data) out[k] = this._data[k];
        return out;
      },
      async set(obj) { Object.assign(this._data, obj); }
    },
    onChanged: { addListener() {} }
  },
  runtime: {
    onMessage: { addListener() {} },
    getURL(p) { return "moz-extension://test/" + p; }
  },
  webNavigation: { onBeforeNavigate: { addListener() {} } },
  tabs: { update() {} }
};
</script>
<script src="lib/match.js"></script>
<script src="background.js"></script>
<script>
(async () => {
  // aspetta che loadDomains() (avviata da background.js) abbia riempito l'indice
  for (let i = 0; i < 100 && !officialIndex.length; i++) {
    await new Promise(r => setTimeout(r, 10));
  }

  let pass = 0, fail = 0;
  const lines = [];
  function warn(host, why) {
    const r = findImpersonation(host);
    const ok = !!r;
    (ok ? pass++ : fail++);
    lines.push((ok ? "PASS" : "FAIL") + " AVVISA " + host +
      (r ? " -> " + r.official + " [" + r.reason + "]" : " -> nessun avviso") + "  (" + why + ")");
  }
  function safe(host, why) {
    const r = findImpersonation(host);
    const ok = !r;
    (ok ? pass++ : fail++);
    lines.push((ok ? "PASS" : "FAIL") + " SICURO " + host +
      (r ? " -> ERRORE: segnalato come " + r.official + " [" + r.reason + "]" : "") + "  (" + why + ")");
  }

  lines.push("== typo / omoglifi / trasposizioni ==");
  warn("rnicrosoft.com", "rn->m");
  warn("paypa1.com", "1->l");
  warn("g00gle.com", "0->o");
  warn("vvhatsapp.com", "vv->w");
  warn("gogle.com", "omissione");
  warn("googgle.com", "inserzione");
  warn("googel.com", "trasposizione");
  warn("ebya.com", "trasposizione nome corto (OSA)");
  warn("amazom.com", "sostituzione");
  warn("pay-pal.com", "trattino camuffato");
  warn("we-transfer.com", "trattino camuffato");

  lines.push("== omografi IDN ==");
  warn("xn--pple-43d.com", "cirillico punycode");

  lines.push("== sottodominio / catene ==");
  warn("paypal.com.evil-login.ru", "ufficiale incastonato");
  warn("login.secure.paypal.com.verify.evil.ru", "catena profonda");
  warn("paypal.com-secure.ru", "trattino al posto del punto");
  warn("paypal.com.tk", "ufficiale + TLD sospetto");
  warn("paypal.secure-verify.ru", "brand come sottodominio + parola sospetta");
  warn("paypal.evil.tk", "brand come sottodominio + TLD sospetto");

  lines.push("== combo-squatting ==");
  warn("paypal-login.com", "brand + parola (trattino)");
  warn("secure-paypal.com", "parola + brand");
  warn("applesupport.com", "brand + parola (attaccato)");
  warn("loginpaypal.com", "parola + brand (attaccato)");
  warn("amazon-verifica.com", "brand + parola italiana");
  warn("microsoft-online.com", "MS reale e' microsoftonline.com");

  lines.push("== abuso TLD ==");
  warn("paypal.tk", "brand su TLD gratuito");
  warn("microsoft.top", "brand su TLD abuso");
  warn("g00gle.xyz", "brand omoglifo su TLD abuso");
  warn("paypal.co", "typo di .com");
  warn("paypal.cm", "typo di .com (Camerun)");
  warn("deutschebank.de", "omissione del trattino dall'ufficiale");

  lines.push("== siti LEGITTIMI (non devono scattare) ==");
  safe("google.com", "ufficiale");
  safe("gitlab.com", "ora ufficiale");
  safe("accounts.google.com", "sottodominio ufficiale");
  safe("login.microsoftonline.com", "sottodominio ufficiale");
  safe("google.com.au", "ccTLD legittimo");
  safe("google.it", "ccTLD legittimo");
  safe("google.de", "ccTLD non in lista ma legittimo");
  safe("amazon.de", "ccTLD non in lista ma legittimo");
  safe("amazon.fr", "ccTLD non in lista ma legittimo");
  safe("amazon.es", "ccTLD non in lista ma legittimo");
  safe("ebay.de", "ccTLD non in lista ma legittimo");
  safe("apple.stackexchange.com", "brand come sottodominio MA niente parole sospette");
  safe("wikipedia.org", "estraneo");
  safe("wix.com", "green-list (vicino a wise)");
  safe("dell.com", "vicino a dhl ma soglia stretta/green");
  safe("lulu.com", "green-list (vicino a hulu)");
  safe("easy.com", "green-list (vicino a etsy)");
  safe("doodle.com", "green-list");
  safe("paypay.com", "green-list");
  safe("finance.com", "green-list (vicino a binance)");
  safe("appleid.com", "green-list (dominio Apple reale)");
  safe("facebookmail.com", "dominio reale Facebook (mail non e' parola sospetta)");
  safe("crypto-news.xyz", "brand generico escluso (crypto)");
  safe("live-support.com", "brand generico escluso (live)");
  safe("office-update.com", "brand generico escluso (office)");
  safe("apple-pie-recipes.com", "brand + parole NON sospette");
  safe("zoom.com", "vicino a zoho/zoom.us ma legittimo");
  safe("xn--bcher-kva.de", "IDN legittimo bucher.de");
  safe("stackexchange.com", "estraneo");
  safe("deutsche-bank.de", "ufficiale con trattino");

  const head = "RISULTATO: " + pass + " pass, " + fail + " fail";
  document.title = "selftest: " + pass + "p/" + fail + "f";
  document.body.textContent = head + "\n\n" + lines.join("\n");
  console.log(head);
  for (const l of lines) if (l.startsWith("FAIL")) console.warn(l);
})();
</script>
</body>
</html>
